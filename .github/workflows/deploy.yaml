name: Deploy to Faable
on:
    push:
        branches:
            - main
            - dev
permissions:
    id-token: write
    contents: write
    pull-requests: write
    issues: write
jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
            - run: npm ci
            - run: npx @faable/faable@latest deploy
